name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  stale:
    name: Close Stale Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    
    steps:
      - name: Close stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          stale-issue-message: >
            Issue ini ditandai sebagai stale karena tidak ada aktivitas selama 60 hari.
            Issue akan ditutup dalam 7 hari jika tidak ada update.
            Jika Anda masih mengalami masalah ini, silakan comment untuk membuka kembali.
          close-issue-message: >
            Issue ini ditutup karena tidak ada aktivitas. 
            Jika masih relevan, silakan buat issue baru dengan informasi terkini.
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical'
          
          # Pull Requests
          stale-pr-message: >
            PR ini ditandai sebagai stale karena tidak ada aktivitas selama 30 hari.
            PR akan ditutup dalam 7 hari jika tidak ada update.
          close-pr-message: >
            PR ini ditutup karena tidak ada aktivitas.
            Silakan rebase dan buka PR baru jika masih ingin merge changes ini.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,in-progress'
          
          # General
          operations-per-run: 100
          remove-stale-when-updated: true

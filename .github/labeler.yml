# Backend
'backend':
  - app/**/*
  - database/**/*
  - routes/**/*
  - config/**/*

# Frontend
'frontend':
  - resources/js/**/*
  - resources/css/**/*

# Tests
'tests':
  - tests/**/*

# Documentation
'documentation':
  - docs/**/*
  - '*.md'

# CI/CD
'ci/cd':
  - .github/**/*

# Dependencies
'dependencies':
  - composer.json
  - composer.lock
  - package.json
  - package-lock.json

# Database
'database':
  - database/migrations/**/*
  - database/seeders/**/*
  - database/factories/**/*

# API
'api':
  - app/Http/Controllers/Api/**/*
  - routes/api.php

# Security
'security':
  - app/Http/Middleware/**/*
  - SECURITY.md
